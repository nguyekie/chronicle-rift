services:
  - type: web
    name: chronicle-rift-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        value: https://chroniclerift.netlify.app
