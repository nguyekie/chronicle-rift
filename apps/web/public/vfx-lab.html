<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chronicle Rift · Limited VFX Lab</title><style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,#26324e,#080d17 48%,#030509);color:#eaf1ff;font-family:Arial,sans-serif}main{min-height:100vh;padding:28px clamp(14px,4vw,60px)}header{display:flex;justify-content:space-between;align-items:end;gap:20px;padding-bottom:20px;border-bottom:1px solid #43516b}h1{margin:5px 0;font-family:Georgia,serif;font-size:clamp(32px,5vw,58px);color:#fff1cc}header small,.gold{color:#e1bb51;letter-spacing:.16em}header p{color:#9eabc0}header a{padding:11px 16px;color:#f2d270;border:1px solid #b78d32;text-decoration:none}.stage{height:310px;margin:24px 0;padding:18px;border:1px solid #41516d;border-radius:15px;background:linear-gradient(#151e2d,#080d16);display:grid;grid-template-rows:1fr auto 1fr;gap:9px}.lane{border:1px solid #35455e;border-radius:10px;background:linear-gradient(90deg,#142136,#211725)}.rift{text-align:center;color:#d5b44d;letter-spacing:.18em}.controls{display:flex;justify-content:space-between;align-items:center;margin:18px 0}.controls button,.card strong{border:1px solid #d2aa42;background:#18243a;color:#f2d270;padding:12px 18px;font-weight:bold}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{min-height:155px;padding:16px;border:1px solid #3a4961;border-radius:11px;background:linear-gradient(145deg,#152034,#0d131f);color:#e7edf7;text-align:left;cursor:pointer}.card:hover{transform:translateY(-3px);border-color:#e0b744;box-shadow:0 12px 30px #0008}.card small,.card b,.card em,.card strong{display:block}.card small{color:#76dceb}.card b{margin:9px 0;font-family:Georgia,serif;font-size:17px;color:#fff0c7}.card em{min-height:42px;color:#9eabc0;font-size:11px;line-height:1.45;font-style:normal}.card strong{display:inline-block;margin-top:12px;padding:8px 11px;font-size:10px}
.cinematic{position:fixed;z-index:20;inset:0;display:grid;place-items:center;overflow:hidden;pointer-events:none;color:#f2cf61;background:radial-gradient(circle,#743ac044,transparent 55%);animation:scene 2.6s both}.cinematic:before,.cinematic:after{content:"";position:absolute;width:45vmin;height:45vmin;border:2px solid currentColor;border-radius:50%;box-shadow:0 0 60px currentColor,inset 0 0 50px currentColor;animation:ring 2.2s ease-out}.cinematic:after{width:72vmin;height:72vmin;border-style:dashed;animation-delay:.15s}.title{position:relative;z-index:5;padding:20px 35px;text-align:center;background:#050811d9;border:1px solid currentColor;box-shadow:0 0 50px #000}.title small,.title b{display:block}.title b{margin-top:9px;font:28px Georgia,serif;color:#fff}.particles{position:absolute;inset:0;overflow:hidden}.particles i{position:absolute;left:calc(var(--n)*5.3%);top:-15%;width:4px;height:90px;background:linear-gradient(#fff,#ffd25f,transparent);filter:drop-shadow(0 0 8px #ffbd45);animation:fall 1.1s linear infinite;animation-delay:calc(var(--n)*-.08s)}.eclipse-rider .title{margin-top:34vh}.valen-blade{background:linear-gradient(115deg,transparent 42%,#fff9b9aa 49%,transparent 55%),radial-gradient(circle,#ce952f55,transparent 52%)}.last-bastion{color:#77d8ff;background:repeating-linear-gradient(90deg,#5ebfff20 0 2px,transparent 2px 90px),radial-gradient(circle,#2d8aa944,transparent 55%)}.eclipse-rider{color:#ff785e;background:radial-gradient(circle,#09030d 0 14%,#d14c3366 15%,transparent 38%)}.void-crown{color:#b875ff;background:conic-gradient(transparent,#6723a155,transparent,#9d49da55,transparent)}.starfall{color:#ffa65d;background:linear-gradient(125deg,transparent 20%,#ffb25899 21%,transparent 23%,transparent 48%,#ffdf8b88 49%,transparent 51%)}.time-break{color:#75e4ff;background:repeating-radial-gradient(circle,#84eaff22 0 2px,transparent 3px 45px)}.balance{color:#e8dca3;background:linear-gradient(90deg,#72d4ff33 0 50%,#ffb15b33 50%)}.origin-shard{color:#6fffe0;background:conic-gradient(from 45deg,transparent,#42e1c166,transparent,#b65eff66,transparent)}.first-riftborn{color:#6dffc2;background:radial-gradient(ellipse,#1effa733,transparent 46%),repeating-linear-gradient(135deg,transparent 0 35px,#55ffb522 36px 38px)}
@keyframes scene{0%,100%{opacity:0}12%,82%{opacity:1}}@keyframes ring{from{scale:.1;rotate:-90deg;opacity:0}30%{opacity:1}to{scale:1.55;rotate:150deg;opacity:0}}@keyframes fall{to{translate:-20vw 120vh}}@media(max-width:800px){header{align-items:start;flex-direction:column}.grid{grid-template-columns:1fr 1fr}}@media(max-width:520px){.grid{grid-template-columns:1fr}.stage{height:250px}.title b{font-size:20px}}
</style></head><body><main><header><div><small>CHRONICLE RIFT · TRANG THỬ ĐỘC LẬP</small><h1>Limited VFX Lab</h1><p>Không đăng nhập · Không API · Không ảnh hưởng dữ liệu game.</p></div><a href="/">Về game</a></header><section class="stage"><div class="lane"></div><b class="rift">◆ KHE NỨT CHRONICLE ◆</b><div class="lane"></div></section><div class="controls"><button id="auto">TỰ ĐỘNG TRÌNH DIỄN</button><span>9 hiệu ứng Limited</span></div><section class="grid" id="cards"></section></main><script>
const fx=[['valen-blade','THÁNH KIẾM VALEN','THÁNH KIẾM PHÁ TRẬN'],['last-bastion','HÀO LŨY CUỐI CÙNG','HÀO LŨY BẤT DIỆT'],['eclipse-rider','KỴ SĨ NHẬT THỰC','KỴ SĨ NHẬT THỰC'],['void-crown','VƯƠNG MIỆN HƯ KHÔNG','VƯƠNG MIỆN HƯ KHÔNG'],['starfall','MƯA SAO BĂNG','MƯA SAO BĂNG'],['time-break','ELIRA VƯỢT THỜI GIAN','ELIRA BẺ GÃY THỜI GIAN'],['balance','NGƯỜI GIỮ CÂN BẰNG','CÂN BẰNG TUYỆT ĐỐI'],['origin-shard','MẢNH VỠ KHỞI NGUYÊN','MẢNH VỠ KHỞI NGUYÊN'],['first-riftborn','RIFTBORN ĐẦU TIÊN','RIFTBORN THỨC TỈNH']];let timer,index=0;const cards=document.querySelector('#cards');fx.forEach((x,i)=>{const b=document.createElement('button');b.className='card';b.innerHTML=`<small>LIMITED ${String(i+1).padStart(2,'0')}</small><b>${x[1]}</b><em>Nhấn để xem hiệu ứng triệu hồi độc lập trên bàn đấu.</em><strong>▶ PHÁT HIỆU ỨNG</strong>`;b.onclick=()=>play(i);cards.appendChild(b)});function play(i){index=i;document.querySelector('.cinematic')?.remove();const x=fx[i],el=document.createElement('div');el.className=`cinematic ${x[0]}`;el.innerHTML=`<span class="particles">${Array.from({length:18},(_,n)=>`<i style="--n:${n+1}"></i>`).join('')}</span><div class="title"><small>HIỆU ỨNG THẺ GIỚI HẠN</small><b>${x[2]}</b></div>`;document.body.appendChild(el);setTimeout(()=>el.remove(),2650)}document.querySelector('#auto').onclick=e=>{if(timer){clearInterval(timer);timer=null;e.target.textContent='TỰ ĐỘNG TRÌNH DIỄN'}else{play(index);timer=setInterval(()=>play(index=(index+1)%fx.length),3100);e.target.textContent='DỪNG TRÌNH DIỄN'}};
</script></body></html>
