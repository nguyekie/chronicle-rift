[build]
  command = "corepack pnpm install --frozen-lockfile && corepack pnpm --filter @chronicle/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10.13.1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

