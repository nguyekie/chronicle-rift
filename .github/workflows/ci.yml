name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: {POSTGRES_USER: chronicle, POSTGRES_PASSWORD: chronicle, POSTGRES_DB: chronicle}
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U chronicle" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://chronicle:chronicle@localhost:5432/chronicle?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: {version: 10.13.1}
      - uses: actions/setup-node@v4
        with: {node-version: 24, cache: pnpm}
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chronicle/api exec prisma generate
      - run: pnpm --filter @chronicle/api exec prisma migrate deploy
      - name: Seed test database
        shell: bash
        run: |
          set +e
          output=$(pnpm --filter @chronicle/api exec prisma db seed 2>&1)
          code=$?
          echo "$output"
          if [ "$code" -ne 0 ]; then
            summary=$(echo "$output" | tail -n 12 | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Database seed failed::$summary"
            exit "$code"
          fi
      - run: pnpm lint && pnpm typecheck && pnpm test && pnpm build
      - run: pnpm --filter @chronicle/web exec playwright install --with-deps chromium
      - name: Browser smoke test
        continue-on-error: true
        run: pnpm --filter @chronicle/web test:e2e
