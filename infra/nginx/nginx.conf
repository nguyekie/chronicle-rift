map $http_upgrade $connection_upgrade { default upgrade; '' close; }
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
upstream chronicle_api { server api:3000; }
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  gzip on;
  gzip_types text/css application/javascript application/json;
  location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://chronicle_api; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Request-ID $request_id; }
  location /socket.io/ { proxy_pass http://chronicle_api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
  location /health { proxy_pass http://chronicle_api; }
  location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
  location ~* \.(js|css|png|jpg|webp|svg|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; }
}
